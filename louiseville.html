<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LouiseVille</title>
    <link rel="stylesheet" href="web.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <h2>Student Residence Finder</h2>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="index.html#residences">Residences</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Residence Detail -->
    <section class="residence-detail">
        <h1>LouiseVille</h1>
        <img src="res1.jpg" alt="LouiseVille">

        <p><strong>Location:</strong> Near Main Campus, zMidrand</p>
        <p><strong>Availability:</strong> 5 rooms left for April 2026</p>
        <p><strong>Amenities:</strong> Wi-Fi, laundry, study rooms, 24/7 security</p>
        <p><strong>Rating:</strong> ★★★★☆ (4.2/5)</p>


        <!-- Review Form -->
        <h3>Leave a Review</h3>
        <form id="review-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <textarea id="comment" placeholder="Your Review" required></textarea>
            <button type="submit">Submit</button>
        </form>

        <a href="index.html#contact" class="btn">Book Now</a>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Student Residence Finder</p>
    </footer>

    <!-- Simple JavaScript to add reviews -->
    <script>
        document.getElementById("review-form").addEventListener("submit", function(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const comment = document.getElementById("comment").value;

            const li = document.createElement("li");
            li.textContent = `"${comment}" – ${name}`;
            document.getElementById("review-list").appendChild(li);

            // Clear form
            document.getElementById("name").value = "";
            document.getElementById("comment").value = "";
        });
    </script>
</body>
</html>
